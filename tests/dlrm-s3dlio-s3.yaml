# dlrm-s3dlio-s3.yaml
#
# DLIO benchmark config for DLRM parquet dataset on S3 (via s3-ultra on port 9200).
# Uses s3dlio's ParquetRowGroupDataset for row-group-granular I/O.
# ~1,968 row-group fetches per epoch across 64 files instead of 16M per-sample reads.
#
# Usage (single-process):
#   export AWS_ACCESS_KEY_ID=minioadmin
#   export AWS_SECRET_ACCESS_KEY=minioadmin
#   python -m dlio_benchmark.main \
#     --config-dir=. --config-name=dlrm-s3dlio-s3

model: dlrm_parquet_s3dlio_s3

framework: pytorch

dataset:
  format: parquet
  storage_type: s3
  storage_root: mlp-flux            # bucket name (no s3:// prefix)
  data_folder: data/dlrm/train/train  # key prefix within bucket
  num_files_train: 64
  num_samples_per_file: 1000000      # 1M rows, 123 row groups @ 8192 rows/RG
  record_length: 1024               # approximate sample size in bytes (informational)
  record_length_stdev: 0
  file_list_train: ""               # auto-discovered from data_folder
  storage_options:
    storage_library: s3dlio         # selects ParquetReaderS3dlio
    endpoint_url: http://127.0.0.1:9200
    prefetch: 16                    # row groups to buffer ahead of Python consumer
    footer_cap: 4194304             # 4 MiB footer window for Parquet metadata

data_loader:
  read_threads: 1                   # s3dlio handles concurrency internally
  prefetch_size: 0                  # disable DLIO-level prefetch (s3dlio does it)
  read_type: on_demand

train:
  # DLRMv2 / B200 parameters from trace logs:
  #   batch_size:        2048 real samples per GPU compute step
  #   computation_time:  0.000770031 s per batch (B200 measured)
  #
  # I/O vs compute granularity:
  #   1 Row Group  = ~256 real samples  = ~8.3 MiB byte-range GET
  #   1 DLIO batch = 2048 real samples  = 8 Row Groups fetched
  #
  # With batch_size=2048 and num_samples_per_file=262144 the training
  # loop runs ~8,192 steps/epoch and compute() is called 8,192 times
  # (vs 16.7M times with batch_size=1).  The read_index fast-path
  # (~50 ns/call) handles the 16.7M sample→RG bisect lookups.
  computation_time: 0.000770031
  epochs: 1
  total_training_steps: -1
  batch_size: 2048
  seed_change_epoch: false

evaluation:
  eval_time: 0.0
  epochs_between_evals: 0           # disable evaluation pass

profiling:
  profiler: none

logging:
  verbosity: INFO
  log_file: dlio-s3dlio-s3.log
